<!DOCTYPE html>
<html lang="pt-br">

{% load static %}

<head>

    <meta charset="UTF-8">

    <title>Painel</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        *{
            box-sizing: border-box;
        }

        body{
    font-family: Arial, sans-serif;

    background: url("{% static 'topgelo.png' %}") center center no-repeat fixed;

    background-size: cover;

    margin: 0;
    padding: 20px;
        }

        .container{
            max-width: 500px;
            margin: auto;
        }

        .card{
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(6px);

            padding: 20px;
            border-radius: 18px;

            box-shadow: 0 4px 15px rgba(0,0,0,0.12);

            margin-bottom: 20px;
        }

        h1{
            text-align: center;
            margin-bottom: 25px;
            color: #0d3b66;
        }

        .info{
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
            background: #f5f7fa;
        }

        .titulo{
            font-size: 15px;
            color: #666;
            margin-bottom: 5px;
        }

        .valor{
            font-size: 28px;
            font-weight: bold;
            color: #28a745;
        }

        .fiado{
            color: #dc3545;
        }

        .pago{
            color: #28a745;
        }

        @media(max-width:600px){

            body{
                padding: 15px;
            }

            .valor{
                font-size: 24px;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🧊 Painel Financeiro</h1>

            <div class="info">
                <div class="titulo">Total Vendido Hoje</div>
                <div class="valor pago">
                    R$ {{ total_hoje|default:"0,00" }}
                </div>
            </div>

            <div class="info">
                <div class="titulo">Total Recebido</div>
                <div class="valor pago">
                    R$ {{ total_pago|default:"0,00" }}
                </div>
            </div>

            <div class="info">
                <div class="titulo">Total Fiado</div>
                <div class="valor fiado">
                    R$ {{ total_fiado|default:"0,00" }}
                </div>
            </div>

            <div class="info">
                <div class="titulo">Quantidade de Vendas</div>
                <div class="valor">
                    {{ qtd_vendas }}
                </div>
            </div>

        </div>

    </div>

</body>
</html>
